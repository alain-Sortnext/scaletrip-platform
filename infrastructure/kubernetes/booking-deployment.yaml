apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: scaletrip
  labels:
    app: booking-service
    version: "0.8.2"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: scaletrip/booking-service:latest
          ports:
            - containerPort: 3001
          env:
            # BUG: Wrong env var name — service expects DATABASE_URL but gets DB_URL
            # This causes the pod to crashloop on startup (SCLT-010)
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: scaletrip-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: scaletrip-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: scaletrip-secrets
                  key: jwt-secret
            - name: NODE_ENV
              value: "production"
          # Missing liveness and readiness probes — pods crash without restart signal
          # TODO: Add probes once /ready endpoint is implemented (SCLT-009)
          # livenessProbe:
          #   httpGet:
          #     path: /health
          #     port: 3001
          #   initialDelaySeconds: 30
          # readinessProbe:
          #   httpGet:
          #     path: /ready
          #     port: 3001
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
