name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # BROKEN: .eslintrc.json references 'scaletrip-custom' plugin
      # which does not exist. This causes ALL lint runs to fail.
      # Error: "Definition for rule 'scaletrip-custom/...' was not found"
      # Fix: Remove 'scaletrip-custom' from .eslintrc.json plugins (SCLT-011)
      - name: Run ESLint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: scaletrip_test
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/scaletrip_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-minimum-32-chars-ok
          NODE_ENV: test
        # NOTE: coverage threshold is 80% — currently at 72% (SCLT-011)
        run: npm run test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript compile
        # BROKEN: Compilation fails on shared/types/Booking.ts line 42
        # Error: Type 'string | undefined' is not assignable to type 'string'
        run: npx tsc --noEmit
      - name: Docker build
        run: docker build -t scaletrip/booking-service:${{ github.sha }} ./services/booking-service

  # TODO: Add deployment job once CI is fixed (SCLT-011)
  # deploy:
  #   needs: build
  #   runs-on: ubuntu-latest
